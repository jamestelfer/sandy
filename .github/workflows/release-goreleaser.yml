name: Release (goreleaser, experimental)

# Manual alternative to release.yml. Lets us compare the GoReleaser bun
# builder against the inline workflow without either pipeline stepping
# on the other. Pick a tag that is NOT already released, since both
# pipelines would otherwise try to create the same GitHub release.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (e.g. v0.0.1-alpha.5)"
        required: true

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_TOKEN: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}
